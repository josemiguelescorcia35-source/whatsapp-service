<!DOCTYPE html>
<html>
<head>
    <title>Conectar WhatsApp</title>
    <style>
        body { font-family: Arial; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        img { width: 300px; height: 300px; border: 2px solid #25d366; border-radius: 10px; }
        button { margin-top: 20px; padding: 10px 20px; background: #25d366; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        #status { margin-top: 10px; font-size: 18px; font-weight: bold; }
        #timer { color: gray; font-size: 14px; }
    </style>
</head>
<body>
    <h2>Conectar WhatsApp - AtendiA</h2>
    <img id="qr" src="" alt="Cargando QR..." />
    <p id="status">Cargando QR...</p>
    <p id="timer"></p>
    <button onclick="loadQR()">🔄 Actualizar QR</button>

    <script>
        const BUSINESS_ID = '3f531adc-62cd-4cdd-8df2-1ab42cafdda9'
        const SERVICE_URL = 'https://whatsapp-service-production-6f8f.up.railway.app'
        let countdown = 20
        let timer

        async function loadQR() {
            clearInterval(timer)
            document.getElementById('status').textContent = 'Cargando QR...'
            document.getElementById('timer').textContent = ''
            
            try {
                const res = await fetch(`${SERVICE_URL}/session/${BUSINESS_ID}/qr`)
                const data = await res.json()
                
                if (data.status === 'connected') {
                    document.getElementById('status').textContent = '✅ WhatsApp conectado!'
                    document.getElementById('qr').src = ''
                    document.getElementById('timer').textContent = 'Ya puedes cerrar esta página'
                } else if (data.qr) {
                    document.getElementById('qr').src = data.qr
                    document.getElementById('status').textContent = '📱 Escanea el QR con tu WhatsApp'
                    
                    // Countdown para actualizar
                    countdown = 20
                    timer = setInterval(() => {
                        countdown--
                        document.getElementById('timer').textContent = `Se actualiza en ${countdown} segundos...`
                        if (countdown <= 0) {
                            clearInterval(timer)
                            loadQR()
                        }
                    }, 1000)
                }
            } catch (err) {
                document.getElementById('status').textContent = '❌ Error conectando al servicio'
            }
        }

        loadQR()
    </script>
</body>
</html>
